<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}" lang="pl">
<head>
    <title th:text="#{users.search.title}">Wyszukiwanie użytkowników</title>
</head>
<body>
<div layout:fragment="content">
    <h1 th:text="#{users.search.title}">Wyszukiwanie użytkowników</h1>

    <div class="mb-3">
        <label for="searchInput" class="form-label" th:text="#{users.search.label}">Wpisz frazę do wyszukania:</label>
        <input type="text" id="searchInput" class="form-control" th:placeholder="#{users.search.placeholder}">
    </div>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th th:text="#{field.user_id}">ID</th>
            <th th:text="#{field.username}">Nazwa użytkownika</th>
            <th th:text="#{field.name}">Imię</th>
            <th th:text="#{field.role}">Rola</th>
        </tr>
        </thead>
        <tbody id="userResults" th:data-error-message="#{users.search.error}">
        </tbody>
    </table>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const searchInput = document.getElementById('searchInput');
            const resultsContainer = document.getElementById('userResults');
            const errorMessage = resultsContainer.dataset.errorMessage;

            searchInput.addEventListener('keyup', function () {
                const searchTerm = this.value.trim();

                if (searchTerm.length > 0) {
                    fetch(`/users/api/search/${searchTerm}`)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.json();
                        })
                        .then(users => {
                            resultsContainer.innerHTML = '';
                            users.forEach(user => {
                                const row = `<tr>
                                                <td>${user.id}</td>
                                                <td>${user.username}</td>
                                                <td>${user.name}</td>
                                                <td>${user.role}</td>
                                             </tr>`;
                                resultsContainer.innerHTML += row;
                            });
                        })
                        .catch(error => {
                            console.error('Błąd podczas wyszukiwania:', error);
                            resultsContainer.innerHTML = `<tr><td colspan="4" class="text-danger">${errorMessage}</td></tr>`;
                        });
                } else {
                    resultsContainer.innerHTML = '';
                }
            });
        });
    </script>
</th:block>

</body>
</html>
