<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout.html}" lang="pl">
<head>
    <title th:text="#{allocations.title}">Zarządzanie alokacjami</title>
</head>
<body>

<div layout:fragment="content">
    <h1 th:text="#{allocations.title}">Zarządzanie Alokacjami</h1>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="#{${successMessage}}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" th:aria-label="#{action.close}"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <h4 class="alert-heading" th:text="#{${errorMessage}}"></h4>
        <p th:text="${errorDetails}"></p>
        <button type="button" class="btn-close" data-bs-dismiss="alert" th:aria-label="#{action.close}"></button>
    </div>

    <div class="card my-4">
        <div class="card-header">
            <h2 class="h5 mb-0" th:text="#{allocations.new}">Nowa alokacja</h2>
        </div>
        <div class="card-body">
            <form th:action="@{/allocations}" th:object="${allocationRequest}" method="post" id="newAllocationForm"
                  class="needs-validation" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="userId" class="form-label" th:text="#{field.user_id}">ID Klienta:</label>
                        <input type="text" id="userId" th:field="*{userId}" class="form-control" required/>
                        <div class="invalid-feedback" th:text="#{validation.field.required}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="resourceId" class="form-label" th:text="#{field.resource_id}">ID Zasobu:</label>
                        <input type="text" id="resourceId" th:field="*{resourceId}" class="form-control" required/>
                        <div class="invalid-feedback" th:text="#{validation.field.required}"></div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary" th:text="#{allocations.create}">Utwórz alokację</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="h5 mb-0" th:text="#{allocations.list}">Lista alokacji</h2>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th th:text="#{field.allocation_id}">ID Alokacji</th>
                        <th th:text="#{field.user_id}">ID Klienta</th>
                        <th th:text="#{field.resource_id}">ID Zasobu</th>
                        <th th:text="#{field.start_time}">Czas rozpoczęcia</th>
                        <th th:text="#{field.end_time}">Czas zakończenia</th>
                        <th th:text="#{field.actions}">Akcje</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="alloc : ${allocations}">
                        <td th:text="${alloc.id}"></td>
                        <td th:text="${alloc.userId}"></td>
                        <td th:text="${alloc.resourceId}"></td>
                        <td th:text="${alloc.startTime != null ? #temporals.format(alloc.startTime, 'yyyy-MM-dd HH:mm:ss') : ''}"></td>
                        <td>
                            <span th:if="${alloc.endTime != null}"
                                  th:text="${#temporals.format(alloc.endTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
                            <span th:if="${alloc.endTime == null}" class="badge bg-success" th:text="#{field.status.active}">Aktywna</span>
                        </td>
                        <td>
                            <form th:if="${alloc.endTime == null}" th:action="@{/allocations/{id}/end(id=${alloc.id})}"
                                  method="post" style="display:inline;"
                                  th:onsubmit="'return confirm(\'' + #{allocations.confirm_end} + '\');'">
                                <button type="submit" class="btn btn-warning btn-sm" th:text="#{allocations.end}">Zakończ</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
        })()
    </script>
</th:block>

</body>
</html>
